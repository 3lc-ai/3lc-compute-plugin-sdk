name: Release

# Publish a tagged release of 3lc-plugin-sdk to the private 3LC CloudRepo (pypi.3lc.ai).
#
# === ONE-TIME SETUP (everything below is ready; this is all that's left) ===
# Create a GitHub Environment named "release" (repo Settings -> Environments) holding:
#   Secrets:
#     CLOUDREPO_USERNAME    - CloudRepo upload user (Ōēł the ACCESS_KEY)
#     CLOUDREPO_PASSWORD    - CloudRepo upload password/token (Ōēł the SECRET_KEY)
#   Variables:
#     CLOUDREPO_PUBLISH_URL - upload endpoint, e.g. https://pypi.3lc.ai/repositories/releases/
#                             (confirm the repo so it surfaces where consumers read; today
#                              consumers still install via `git @ develop`, so not yet load-bearing)
# Optionally add required reviewers on the "release" environment to gate publishes.
#
# To cut a release: bump `version` in pyproject.toml, commit, then push a tag `vX.Y.Z`
# that matches it (or run via workflow_dispatch).
#
# FUTURE (public flip): when the repo/package go public, drop the CloudRepo env + the
# `Private :: Do Not Upload` classifier and switch the publish step to OIDC trusted
# publishing to PyPI (bare `uv publish`, `id-token: write`) ŌĆö see 3lc-ultralytics/release.yml.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  # Gate the release on the full CI suite (ruff ┬Ę mypy ┬Ę pytest).
  test:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: release
    env:
      UV_PUBLISH_URL: ${{ vars.CLOUDREPO_PUBLISH_URL }}
      UV_PUBLISH_USERNAME: ${{ secrets.CLOUDREPO_USERNAME }}
      UV_PUBLISH_PASSWORD: ${{ secrets.CLOUDREPO_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.15"

      - name: Verify tag matches pyproject version
        if: github.event_name == 'push'
        run: |
          PKG=$(uv version --output-format json | jq -r '.version')
          TAG="${GITHUB_REF_NAME#v}"
          echo "pyproject=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag $GITHUB_REF_NAME ($TAG) != pyproject version $PKG"; exit 1; }

      - name: Verify the 'release' environment is configured
        run: |
          : "${UV_PUBLISH_URL:?set the CLOUDREPO_PUBLISH_URL variable on the 'release' environment}"
          : "${UV_PUBLISH_USERNAME:?set the CLOUDREPO_USERNAME secret on the 'release' environment}"
          : "${UV_PUBLISH_PASSWORD:?set the CLOUDREPO_PASSWORD secret on the 'release' environment}"

      # --no-sources strips [tool.uv.sources] so the released wheel never bakes in a dev
      # index/path override (matches 3lc-ultralytics' release build).
      - name: Build
        run: uv build --no-sources

      - name: Publish to CloudRepo
        run: uv publish
